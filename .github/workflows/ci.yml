name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @project-x/database run generate

      - name: Build shared-types (required for api lint)
        run: pnpm --filter @project-x/shared-types run build

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: API tests
        run: pnpm --filter @project-x/api test

      - name: Mobile validation
        run: |
          cd apps/mobile
          flutter pub get
          flutter analyze
          flutter test
